<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF4458">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🔥 Tinder P2P – ID & Découverte</title>
    <style>
        :root {
            --primary: #FF4458;
            --primary-light: #FF6B6B;
            --success: #00D46A;
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #636366;
            --border: #E5E5EA;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #app {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        nav {
            display: flex;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
        }
        nav button {
            flex:1;
            background:none;
            border:none;
            font-size:22px;
            cursor:pointer;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            border-radius: 12px;
            padding: 8px;
        }
        nav button.active { color: var(--primary); background: rgba(255,68,88,0.1); }
        .screen { display:none; flex:1; overflow-y:auto; padding:20px; flex-direction:column; }
        .screen.active { display:flex; }
        .btn {
            padding: 12px 20px;
            border-radius: 100px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: white;
            background: var(--primary);
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-success { background: var(--success); }
        .btn-ghost {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--surface);
            margin-bottom: 12px;
        }
        .id-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .id-value {
            font-family: monospace;
            word-break: break-all;
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
        }
        .profile-avatar {
            width: 120px; height:120px; border-radius:50%; background: linear-gradient(135deg, #5856D6, #FF4458);
            display: flex; align-items:center; justify-content:center; font-size:48px; margin: 0 auto 20px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-avatar {
            width: 48px; height:48px; border-radius:50%; background: linear-gradient(135deg, #5856D6, #FF4458);
            display: flex; align-items:center; justify-content:center; font-size:24px;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            z-index: 999;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from{opacity:0;transform:translate(-50%,-20px);} }
    </style>
</head>
<body>
<div id="app">
    <!-- Profil -->
    <section id="screen-profile" class="screen active">
        <h2 style="margin-bottom:20px;">👤 Mon Profil</h2>
        <div class="profile-avatar" id="profile-avatar">😊</div>
        <button class="btn" id="btn-change-avatar" style="margin-bottom:16px;">📷 Changer avatar</button>
        <input class="input-field" id="input-name" placeholder="Ton prénom" maxlength="30">
        <textarea class="input-field" id="input-bio" placeholder="Ta bio..." rows="2" maxlength="150"></textarea>
        <button class="btn" id="btn-save-profile" style="width:100%;">💾 Sauvegarder</button>
        <div class="id-box">
            <strong>🔑 Ton ID unique</strong>
            <div class="id-value" id="display-peer-id">⏳ Génération en cours...</div>
            <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
                <button class="btn btn-ghost" id="btn-copy-id">📋 Copier</button>
                <button class="btn btn-ghost" id="btn-share-id">📤 Partager</button>
                <button class="btn btn-ghost" id="btn-regenerate-id">🔄 Régénérer</button>
            </div>
            <p style="margin-top:8px; font-size:12px; color:var(--text-secondary);" id="network-status"></p>
        </div>
    </section>

    <!-- Découvrir -->
    <section id="screen-discover" class="screen">
        <h2 style="margin-bottom:20px;">🔍 Découvrir</h2>
        <button class="btn btn-success" id="btn-toggle-discover" style="margin-bottom:16px;">Découverte : OFF</button>
        <input class="input-field" id="input-peer-id" placeholder="Colle un ID ici...">
        <button class="btn" id="btn-connect" style="width:100%; margin-bottom:20px;">🔗 Se connecter</button>
        <div id="discover-list"></div>
    </section>

    <!-- Matchs -->
    <section id="screen-matches" class="screen">
        <h2 style="margin-bottom:20px;">💝 Mes Matchs</h2>
        <div id="matches-list"></div>
    </section>

    <!-- Chat overlay -->
    <div id="chat-overlay" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:200; flex-direction:column;">
        <div style="display:flex; align-items:center; padding:16px; border-bottom:1px solid var(--border);">
            <button id="btn-close-chat" class="btn btn-ghost" style="margin-right:12px;">← Retour</button>
            <h3 id="chat-peer-name">Chat</h3>
        </div>
        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px;"></div>
        <div style="display:flex; gap:8px; padding:12px; border-top:1px solid var(--border);">
            <input id="input-message" class="input-field" placeholder="Message..." style="flex:1; margin:0;">
            <button id="btn-send" class="btn">➤</button>
        </div>
    </div>

    <nav>
        <button class="active" data-screen="profile">👤 Profil</button>
        <button data-screen="discover">🔍 Découvrir</button>
        <button data-screen="matches">💝 Matchs</button>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bugout@0.0.10/index.js"></script>
<script>
    // ===== ÉTAT =====
    const STATE = {
        myPeerId: null,
        profile: JSON.parse(localStorage.getItem('p2p_profile') || '{"name":"","bio":"","avatar":"😊"}'),
        isDiscoverable: false,
        matches: JSON.parse(localStorage.getItem('p2p_matches') || '{}'),
        currentChatPeer: null,
        bugout: null,
        seenPeers: new Set()
    };

    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ===== PROFIL =====
    function loadProfileUI() {
        $('#input-name').value = STATE.profile.name;
        $('#input-bio').value = STATE.profile.bio;
        $('#profile-avatar').textContent = STATE.profile.avatar;
    }

    $('#btn-save-profile').addEventListener('click', () => {
        STATE.profile.name = $('#input-name').value.trim();
        STATE.profile.bio = $('#input-bio').value.trim();
        if (!STATE.profile.name) return toast('⚠️ Entre un prénom');
        localStorage.setItem('p2p_profile', JSON.stringify(STATE.profile));
        toast('✅ Profil sauvegardé');
    });

    const avatars = ['😊','😎','🥳','🤩','😇','🦊','🐱','🐶','🦄','🐼','🌸','🔥','💎','🍕','🎸','⚽'];
    $('#btn-change-avatar').addEventListener('click', () => {
        const idx = avatars.indexOf(STATE.profile.avatar);
        STATE.profile.avatar = avatars[(idx + 1) % avatars.length];
        $('#profile-avatar').textContent = STATE.profile.avatar;
    });

    // ===== IDENTIFIANT UNIQUE =====
    function generateFallbackId() {
        return 'local-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36);
    }

    async function initBugout() {
        $('#network-status').textContent = '🔵 Connexion au réseau P2P...';
        if (typeof Bugout === 'undefined') {
            throw new Error('Bibliothèque Bugout manquante');
        }
        STATE.bugout = new Bugout();
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const maxAttempts = 30; // 3 secondes max
            const check = setInterval(() => {
                const addr = STATE.bugout.address();
                if (addr) {
                    clearInterval(check);
                    STATE.myPeerId = addr;
                    $('#display-peer-id').textContent = addr;
                    $('#network-status').textContent = '🟢 Connecté (P2P)';
                    setupNetworkListeners();
                    resolve(addr);
                }
                attempts++;
                if (attempts >= maxAttempts) {
                    clearInterval(check);
                    // Fallback : générer un ID local
                    const fallback = generateFallbackId();
                    STATE.myPeerId = fallback;
                    $('#display-peer-id').textContent = fallback;
                    $('#network-status').textContent = '🟠 Mode local (WebRTC non disponible)';
                    console.warn('Bugout n’a pas fourni d’adresse, fallback ID:', fallback);
                    // On peut toujours discuter via l'ID local (échange manuel)
                    setupFallbackListeners();
                    resolve(fallback);
                }
            }, 100);
        });
    }

    function setupNetworkListeners() {
        if (!STATE.bugout) return;
        STATE.bugout.on('seen', (addr) => {
            if (addr !== STATE.myPeerId && !STATE.seenPeers.has(addr)) {
                STATE.seenPeers.add(addr);
                console.log('👀 Nouveau pair vu:', addr);
                // Découverte automatique : si on est découvrable, on envoie un ping
                if (STATE.isDiscoverable) {
                    STATE.bugout.send(addr, { type: 'ping', profile: STATE.profile });
                    toast(`🔍 Tentative de connexion avec un nouveau pair...`);
                }
            }
        });
        STATE.bugout.on('message', (addr, data) => {
            if (!data || typeof data !== 'object') return;
            if (data.type === 'ping' && STATE.isDiscoverable) {
                STATE.bugout.send(addr, { type: 'pong', profile: STATE.profile });
                addOrUpdateMatch(addr, data.profile);
                toast(`💌 ${data.profile.name || 'Quelqu’un'} t’a trouvé !`);
            } else if (data.type === 'pong') {
                addOrUpdateMatch(addr, data.profile);
                toast(`🎉 Profil trouvé !`);
            } else if (data.type === 'message' && data.text) {
                receiveMessage(addr, data.text);
            }
        });
    }

    function setupFallbackListeners() {
        // En mode local, on ne peut pas recevoir de messages sans serveur de signalisation.
        // On peut toutefois gérer les messages locaux si on les reçoit (peu probable).
        console.log('Mode fallback – connexion manuelle uniquement');
    }

    $('#btn-regenerate-id').addEventListener('click', async () => {
        if (STATE.bugout) {
            try { STATE.bugout.destroy?.(); } catch(e) {}
        }
        STATE.myPeerId = null;
        STATE.seenPeers.clear();
        $('#display-peer-id').textContent = '⏳ Régénération...';
        await initBugout();
        toast('✅ Nouvel ID généré');
    });

    // ===== DÉCOUVRABILITÉ =====
    $('#btn-toggle-discover').addEventListener('click', () => {
        STATE.isDiscoverable = !STATE.isDiscoverable;
        const btn = $('#btn-toggle-discover');
        btn.textContent = `Découverte : ${STATE.isDiscoverable ? 'ON' : 'OFF'}`;
        btn.className = `btn ${STATE.isDiscoverable ? 'btn-success' : ''}`;
        toast(STATE.isDiscoverable ? '📡 Tu es visible !' : '🔒 Tu es invisible.');
    });

    // ===== CONNEXION MANUELLE =====
    $('#btn-connect').addEventListener('click', () => {
        const peerId = $('#input-peer-id').value.trim();
        if (!peerId) return toast('⚠️ Entre un ID');
        if (peerId === STATE.myPeerId) return toast('⚠️ C’est ton propre ID');
        if (STATE.matches[peerId]) return toast('💬 Déjà en contact');
        if (!STATE.bugout) return toast('❌ Pas de connexion réseau');
        STATE.bugout.send(peerId, { type: 'ping', profile: STATE.profile });
        toast('🔍 Recherche...');
        // Timeout
        setTimeout(() => {
            if (!STATE.matches[peerId]) toast('❌ Personne trouvée avec cet ID');
        }, 8000);
    });

    // ===== GESTION DES MATCHS =====
    function addOrUpdateMatch(peerId, profile) {
        if (!STATE.matches[peerId]) {
            STATE.matches[peerId] = {
                name: profile.name || 'Anonyme',
                bio: profile.bio || '',
                avatar: profile.avatar || '😊',
                messages: [],
                starred: false,
                unread: 0,
                lastActivity: Date.now()
            };
        } else {
            Object.assign(STATE.matches[peerId], {
                name: profile.name || STATE.matches[peerId].name,
                bio: profile.bio || STATE.matches[peerId].bio,
                avatar: profile.avatar || STATE.matches[peerId].avatar,
                lastActivity: Date.now()
            });
        }
        saveMatches();
        renderMatches();
        renderDiscover();
    }

    function saveMatches() {
        localStorage.setItem('p2p_matches', JSON.stringify(STATE.matches));
    }

    function renderMatches() {
        const container = $('#matches-list');
        const ids = Object.keys(STATE.matches);
        if (ids.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:gray;">💔 Aucun match</p>';
            return;
        }
        container.innerHTML = ids.map(id => {
            const m = STATE.matches[id];
            const lastMsg = m.messages.length ? m.messages[m.messages.length-1].text : 'Pas de messages';
            return `
            <div class="card">
                <div class="card-avatar">${m.avatar}</div>
                <div style="flex:1;">
                    <strong>${m.name} ${m.starred ? '⭐' : ''}</strong>
                    <p style="font-size:13px;color:gray;">${lastMsg.substring(0,40)}</p>
                </div>
                <button class="btn" data-peer="${id}" onclick="openChat('${id}')">💬</button>
            </div>`;
        }).join('');
    }

    function renderDiscover() {
        const container = $('#discover-list');
        const ids = Object.keys(STATE.matches);
        if (ids.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:gray;">🔍 Aucun profil découvert</p>';
            return;
        }
        container.innerHTML = ids.map(id => {
            const m = STATE.matches[id];
            return `
            <div class="card">
                <div class="card-avatar">${m.avatar}</div>
                <div style="flex:1;">
                    <strong>${m.name}</strong>
                    <p style="font-size:13px;">${m.bio || 'Pas de bio'}</p>
                </div>
                <button class="btn" onclick="openChat('${id}')">💬</button>
            </div>`;
        }).join('');
    }

    // ===== CHAT =====
    function openChat(peerId) {
        STATE.currentChatPeer = peerId;
        const m = STATE.matches[peerId];
        $('#chat-peer-name').textContent = m.name || 'Anonyme';
        $('#chat-messages').innerHTML = m.messages.map(msg => {
            const cls = msg.sent ? 'sent' : 'received';
            const bg = msg.sent ? 'background:#FF4458;color:white;align-self:flex-end;' : 'background:white;border:1px solid #ddd;';
            return `<div style="padding:10px 14px;border-radius:18px;margin:4px 0;max-width:75%;${bg}">${msg.text}<br><small>${msg.time}</small></div>`;
        }).join('');
        document.getElementById('chat-overlay').style.display = 'flex';
        $('#input-message').focus();
        // Marquer comme lu
        if (m.unread) {
            m.unread = 0;
            saveMatches();
        }
    }

    function closeChat() {
        document.getElementById('chat-overlay').style.display = 'none';
        STATE.currentChatPeer = null;
        renderMatches();
    }

    $('#btn-close-chat').addEventListener('click', closeChat);

    $('#btn-send').addEventListener('click', sendMessage);
    $('#input-message').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        const text = $('#input-message').value.trim();
        if (!text || !STATE.currentChatPeer) return;
        const msg = { text, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), sent: true };
        STATE.matches[STATE.currentChatPeer].messages.push(msg);
        saveMatches();
        // Afficher
        $('#chat-messages').innerHTML += `<div style="padding:10px 14px;border-radius:18px;margin:4px 0;max-width:75%;background:#FF4458;color:white;align-self:flex-end;">${text}<br><small>${msg.time}</small></div>`;
        $('#input-message').value = '';
        $('#chat-messages').scrollTop = $('#chat-messages').scrollHeight;
        // Envoyer via Bugout
        if (STATE.bugout) {
            STATE.bugout.send(STATE.currentChatPeer, { type: 'message', text });
        }
    }

    function receiveMessage(peerId, text) {
        const msg = { text, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), sent: false };
        if (!STATE.matches[peerId]) return;
        STATE.matches[peerId].messages.push(msg);
        STATE.matches[peerId].unread = (STATE.matches[peerId].unread || 0) + 1;
        saveMatches();
        if (STATE.currentChatPeer === peerId) {
            // Afficher en direct
            $('#chat-messages').innerHTML += `<div style="padding:10px 14px;border-radius:18px;margin:4px 0;max-width:75%;background:white;border:1px solid #ddd;">${text}<br><small>${msg.time}</small></div>`;
            $('#chat-messages').scrollTop = $('#chat-messages').scrollHeight;
            STATE.matches[peerId].unread = 0;
            saveMatches();
        } else {
            toast(`📩 Nouveau message de ${STATE.matches[peerId].name}`);
        }
    }

    // ===== ID COPY / SHARE =====
    $('#btn-copy-id').addEventListener('click', () => {
        if (!STATE.myPeerId) return;
        navigator.clipboard.writeText(STATE.myPeerId)
            .then(() => toast('📋 ID copié'))
            .catch(() => toast('❌ Erreur de copie'));
    });

    $('#btn-share-id').addEventListener('click', () => {
        if (!STATE.myPeerId) return;
        if (navigator.share) {
            navigator.share({ title: 'Mon ID Tinder P2P', text: STATE.myPeerId })
                .catch(() => {});
        } else {
            navigator.clipboard.writeText(STATE.myPeerId)
                .then(() => toast('📋 ID copié (partage non supporté)'))
                .catch(() => toast('❌ Erreur'));
        }
    });

    // ===== NAVIGATION =====
    $$('nav button').forEach(btn => {
        btn.addEventListener('click', () => {
            const screen = btn.dataset.screen;
            $$('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            $$('.screen').forEach(s => s.classList.remove('active'));
            $(`#screen-${screen}`).classList.add('active');
            if (screen === 'matches') renderMatches();
            if (screen === 'discover') renderDiscover();
        });
    });

    // ===== INITIALISATION =====
    (async () => {
        loadProfileUI();
        try {
            await initBugout();
        } catch(e) {
            console.error(e);
            $('#display-peer-id').textContent = '❌ Erreur critique';
            $('#network-status').textContent = '🔴 Échec de connexion';
        }
        renderMatches();
    })();
</script>
</body>
</html>
