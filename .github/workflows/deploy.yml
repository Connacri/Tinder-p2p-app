name: Build APK & Release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Type de version'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔢 Generate version
        id: version
        run: |
          # Récupérer le dernier tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Dernier tag: $LAST_TAG"
          
          # Extraire les numéros
          MAJOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f3)
          
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Nouvelle version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Sauvegarder pour usage ultérieur
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
      
      - name: 🔧 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 34
          build-tools-version: 34.0.0

      - name: 🔑 Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias tinderp2p \
            -storepass android123 \
            -keypass android123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Connacri, OU=Dev, O=TinderP2P, L=Paris, ST=France, C=FR"
      
      - name: 🏗️ Create Android project
        run: |
          mkdir -p app/src/main/java/com/connacri/tinderp2p
          mkdir -p app/src/main/res/values
          
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Tinder P2P"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          cat > app/src/main/java/com/connacri/tinderp2p/MainActivity.java << 'JAVA'
          package com.connacri.tinderp2p;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  webView.loadUrl("https://connacri.github.io/Tinder-p2p-app/");
                  setContentView(webView);
              }
              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA
          
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#1a73e8</item>
                  <item name="colorPrimaryDark">#1557b0</item>
                  <item name="colorAccent">#1a73e8</item>
              </style>
          </resources>
          STYLES
      
      - name: 📝 Create Gradle files
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "TinderP2P"; include ':app'
          GRADLE
          
          cat > build.gradle << 'GRADLE'
          plugins { id 'com.android.application' version '8.1.4' apply false }
          GRADLE
          
          VCODE=$(echo $VERSION | sed 's/v//' | tr -d '.')
          cat > app/build.gradle << GRADLE
          plugins { id 'com.android.application' }
          android {
              namespace 'com.connacri.tinderp2p'
              compileSdk 34
              defaultConfig {
                  applicationId "com.connacri.tinderp2p"
                  minSdk 21
                  targetSdk 34
                  versionCode ${VCODE:-1}
                  versionName "${VERSION:-v1.0.0}"
              }
              signingConfigs {
                  release { storeFile file("../release.keystore"); storePassword "android123"; keyAlias "tinderp2p"; keyPassword "android123" }
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          GRADLE
          
          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          PROPS
      
      - name: 📥 Download Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
      
      - name: 🔨 Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease --no-daemon
      
      - name: 📋 Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/Tinder-P2P-${VERSION}.apk"
          ls -lh release/
      
      - name: 🏷️ Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION
      
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "🔥 Tinder P2P ${{ env.VERSION }}"
          body: |
            ## 📱 Tinder P2P - ${{ env.VERSION }}
            
            ### 📥 Téléchargement
            - **[⬇️ Télécharger l'APK](https://github.com/Connacri/Tinder-p2p-app/releases/download/${{ env.VERSION }}/Tinder-P2P-${{ env.VERSION }}.apk)**
            
            ### 🌐 Version Web
            - [Ouvrir dans le navigateur](https://connacri.github.io/Tinder-p2p-app/)
            
            ### 🔧 Changements
            - Version ${{ env.VERSION }}
            - APK Android avec WebView
            - PWA avec P2P réel (Bugout)
            
            ### 📱 Installation
            1. Télécharge l'APK
            2. Ouvre le fichier
            3. Accepte "Sources inconnues"
            4. Profite !
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tinder-P2P-${{ env.VERSION }}
          path: release/*.apk
          retention-days: 30