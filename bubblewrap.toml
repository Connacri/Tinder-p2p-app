[app]
name = "Tinder P2P"
packageId = "com.connacri.tinderp2p"
displayMode = "standalone"
backgroundColor = "#F8F9FA"
themeColor = "#FF4458"
startUrl = "https://connacri.github.io/Tinder-p2p-app/"

[android]
minSdkVersion = 21
targetSdkVersion = 34
compileSdkVersion = 34

[signing]
# IMPORTANT : utiliser un vrai keystore de production (via CI secret)
# Ne jamais committer les mots de passe ici
keystore = "release.keystore"
keystorePassword = "${KEYSTORE_PASSWORD}"
keyAlias = "${KEY_ALIAS}"
keyPassword = "${KEY_PASSWORD}"

[icons]
icon = "assets/icon-512.png"