name: Build APK Android (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 33
          build-tools-version: 33.0.0
      
      - name: 🔨 Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
      
      - name: 📝 Create Bubblewrap config
        run: |
          cat > bubblewrap.toml << 'EOF'
          [app]
          name = "Tinder P2P"
          packageId = "com.connacri.tinderp2p"
          displayMode = "standalone"
          backgroundColor = "#f0f2f5"
          themeColor = "#1a73e8"
          startUrl = "https://connacri.github.io/Tinder-p2p-app/"
          
          [android]
          minSdkVersion = 21
          targetSdkVersion = 33
          compileSdkVersion = 33
          
          [signing]
          keystore = "debug.keystore"
          keystorePassword = "android"
          keyAlias = "androiddebugkey"
          keyPassword = "android"
          
          [icons]
          icon = "assets/icon-512.png"
          EOF
      
      - name: 🎨 Create icon
        run: |
          mkdir -p assets
          python3 -c "
          from PIL import Image
          img = Image.new('RGB', (512, 512), color=(26, 115, 232))
          # Dessiner un emoji feu simple
          from PIL import ImageDraw
          draw = ImageDraw.Draw(img)
          draw.ellipse([100, 50, 412, 462], fill=(255, 255, 255))
          draw.text((180, 150), '🔥', font_size=200)
          img.save('assets/icon-512.png')
          print('✅ Icône créée')
          " || python3 -c "
          # Fallback: créer un PNG minimal
          import base64
          png = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPj/HwADBwIAMCbHYQAAAABJRU5ErkJggg==')
          with open('assets/icon-512.png', 'wb') as f:
              f.write(png)
          print('✅ Icône fallback créée')
          "
      
      - name: 🔑 Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null || echo "Keystore already exists"
      
      - name: 🏗️ Build TWA APK (automatisé)
        run: |
          # Répondre "No" automatiquement (on a déjà JDK 17)
          echo "no" | bubblewrap build
      
      - name: 📋 Find APK
        run: |
          echo "Recherche des APK..."
          find . -name "*.apk" -type f -exec ls -lh {} \;
      
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinder-p2p-apk
          path: "**/*.apk"
          retention-days: 30
      
      - name: 🚀 Create Release (on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: "**/*.apk"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}