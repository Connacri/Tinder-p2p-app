name: Build APK & Release Signée

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Type de version'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # 1. CHECKOUT + VERSION
      # ============================================================
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔢 Générer la version
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          MAJOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f3)

          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          case $BUMP_TYPE in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          while git rev-parse "$NEW_VERSION" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "✅ Version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      # ============================================================
      # 2. SETUP JAVA + ANDROID SDK
      # ============================================================
      - name: 🔧 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 34
          build-tools-version: 34.0.0

      # ============================================================
      # 3. KEYSTORE
      # ============================================================
      - name: 🔐 Restaurer le keystore de release
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
            echo "✅ Keystore restauré depuis les secrets"
          else
            echo "⚠️ Pas de keystore en secret — génération d'un keystore debug"
            keytool -genkey -v \
              -keystore release.keystore \
              -alias tinderp2p \
              -storepass android123 \
              -keypass android123 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug, OU=Dev, O=TinderP2P, L=Paris, ST=France, C=FR"
          fi

      # ============================================================
      # 4. PROJET ANDROID
      # ============================================================
      - name: 🏗️ Créer le projet Android
        run: |
          mkdir -p app/src/main/java/com/connacri/tinderp2p
          mkdir -p app/src/main/res/values
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "app/src/main/res/mipmap-${d}"
          done

          # Icône
          python3 << 'PYTHON'
          import os, struct, zlib
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          icon_source = 'assets/icon-512.png'
          if os.path.exists(icon_source):
              try:
                  from PIL import Image
                  img = Image.open(icon_source)
                  for density, size in sizes.items():
                      img.resize((size, size), Image.LANCZOS).save(
                          f'app/src/main/res/mipmap-{density}/ic_launcher.png')
              except ImportError:
                  import shutil
                  for density in sizes:
                      shutil.copy(icon_source, f'app/src/main/res/mipmap-{density}/ic_launcher.png')
          else:
              def make_png(w, h, color):
                  def chunk(t, d):
                      c = t + d
                      return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
                  raw = b''.join(b'\x00' + struct.pack('BBB', *color) * w for _ in range(h))
                  return (b'\x89PNG\r\n\x1a\n'
                          + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                          + chunk(b'IDAT', zlib.compress(raw))
                          + chunk(b'IEND', b''))
              for density, size in sizes.items():
                  with open(f'app/src/main/res/mipmap-{density}/ic_launcher.png', 'wb') as f:
                      f.write(make_png(size, size, (255, 68, 88)))
          PYTHON

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Tinder P2P"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          cat > app/src/main/java/com/connacri/tinderp2p/MainActivity.java << 'JAVA'
          package com.connacri.tinderp2p;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  webView.loadUrl("https://connacri.github.io/Tinder-p2p-app/");
                  setContentView(webView);
              }
              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA

          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#FF4458</item>
                  <item name="colorPrimaryDark">#E53945</item>
                  <item name="colorAccent">#FF4458</item>
              </style>
          </resources>
          STYLES

          cat > app/src/main/res/values/colors.xml << 'COLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#FF4458</color>
              <color name="colorPrimaryDark">#E53945</color>
              <color name="colorAccent">#FF4458</color>
          </resources>
          COLORS

      # ============================================================
      # 5. FICHIERS GRADLE
      # ============================================================
      - name: 📝 Créer les fichiers Gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "TinderP2P"
          include ':app'
          GRADLE

          cat > build.gradle << 'GRADLE'
          plugins { id 'com.android.application' version '8.1.4' apply false }
          GRADLE

          # Calcul du versionCode : supprimer le préfixe v et les points, retirer les zéros initiaux
          VCODE=$(echo "$VERSION" | sed 's/v//' | tr -d '.' | sed 's/^0*//')
          [ -z "$VCODE" ] && VCODE="1"
          echo "VersionCode: $VCODE"

          STORE_PASS="${KEYSTORE_PASSWORD:-android123}"
          KEY_ALIAS_VAL="${KEY_ALIAS:-tinderp2p}"
          KEY_PASS="${KEY_PASSWORD:-android123}"

          cat > app/build.gradle << GRADLE
          plugins { id 'com.android.application' }
          android {
              namespace 'com.connacri.tinderp2p'
              compileSdk 34
              defaultConfig {
                  applicationId "com.connacri.tinderp2p"
                  minSdk 21
                  targetSdk 34
                  versionCode ${VCODE}
                  versionName "${VERSION}"
              }
              signingConfigs {
                  release {
                      storeFile file("../release.keystore")
                      storePassword "${STORE_PASS}"
                      keyAlias "${KEY_ALIAS_VAL}"
                      keyPassword "${KEY_PASS}"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          GRADLE

          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPS
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ============================================================
      # 6. BUILD
      # ============================================================
      - name: 📥 Télécharger Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> "$GITHUB_PATH"

      - name: 🔨 Builder l'APK signé
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease --no-daemon

      # ============================================================
      # 7. RELEASE
      # ============================================================
      - name: 📋 Préparer la release
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/Tinder-P2P-${VERSION}.apk"
          ls -lh release/

      - name: 🏷️ Créer et pusher le tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ ERREUR: Le tag $VERSION existe déjà"
            exit 1
          fi
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: 🚀 Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "🔥 Tinder P2P ${{ env.VERSION }}"
          body: |
            ## 📱 Tinder P2P - ${{ env.VERSION }}

            ### 📥 Téléchargement
            - **[⬇️ Télécharger l'APK signé](https://github.com/Connacri/Tinder-p2p-app/releases/download/${{ env.VERSION }}/Tinder-P2P-${{ env.VERSION }}.apk)**

            ### 🌐 Version Web
            - [Ouvrir dans le navigateur](https://connacri.github.io/Tinder-p2p-app/)

            ### 📱 Installation
            1. Télécharge l'APK
            2. Ouvre le fichier
            3. Accepte "Sources inconnues"
            4. Profite !
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload APK (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: Tinder-P2P-${{ env.VERSION }}-signed
          path: release/*.apk
          retention-days: 90