name: Build APK Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 34
          build-tools-version: 34.0.0

      - name: 📥 Install SDK packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      
      - name: 🔑 Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias tinderp2p \
            -storepass android123 \
            -keypass android123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Connacri, OU=Dev, O=TinderP2P, L=Paris, ST=France, C=FR"
      
      - name: 🏗️ Create Android project
        run: |
          mkdir -p app/src/main/java/com/connacri/tinderp2p
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Tinder P2P"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true"
                  android:supportsRtl="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          # MainActivity.java
          cat > app/src/main/java/com/connacri/tinderp2p/MainActivity.java << 'JAVA'
          package com.connacri.tinderp2p;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          
          public class MainActivity extends Activity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setAllowContentAccess(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  
                  webView.loadUrl("https://connacri.github.io/Tinder-p2p-app/");
                  
                  setContentView(webView);
              }
              
              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA
          
          # Styles
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#1a73e8</item>
                  <item name="colorPrimaryDark">#1557b0</item>
                  <item name="colorAccent">#1a73e8</item>
              </style>
          </resources>
          STYLES
          
          # Colors
          cat > app/src/main/res/values/colors.xml << 'COLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1a73e8</color>
              <color name="colorPrimaryDark">#1557b0</color>
              <color name="colorAccent">#1a73e8</color>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          COLORS
      
      - name: 📝 Create Gradle files (COMPATIBLE VERSION)
        run: |
          # Gradle wrapper properties - Version 8.2 stable
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          
          # Root build.gradle - Compatible syntax
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.layout.buildDirectory
          }
          GRADLE
          
          # App build.gradle - Syntaxe corrigée
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.connacri.tinderp2p'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.connacri.tinderp2p"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              
              signingConfigs {
                  release {
                      storeFile file("../release.keystore")
                      storePassword "android123"
                      keyAlias "tinderp2p"
                      keyPassword "android123"
                  }
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
                  debug {
                      signingConfig signingConfigs.release
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE
          
          # settings.gradle
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "TinderP2P"
          include ':app'
          GRADLE
          
          # gradle.properties
          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPS
      
      - name: 📦 Download Gradle wrapper
        run: |
          # Télécharger le gradle-wrapper.jar
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          
          # Rendre exécutable
          chmod +x gradlew 2>/dev/null || true
      
      - name: 🔨 Build APK
        run: |
          # Générer le wrapper
          gradle wrapper --gradle-version 8.2 2>/dev/null || true
          
          # Build avec stacktrace pour debug
          ./gradlew assembleRelease --stacktrace --no-daemon
      
      - name: 📋 Find APK
        run: |
          echo "===================="
          echo "APK généré :"
          find . -name "*.apk" -type f -exec ls -lh {} \;
          echo "===================="
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tinder-P2P-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}